<svg width="16" height="16" viewBox="0 0 16 16"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Diagonal yellow shading -->
    <linearGradient id="coinFill" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F9C842"/>
      <stop offset="50%"  stop-color="#FBD75A"/>
      <stop offset="100%" stop-color="#F4A723"/>
    </linearGradient>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="8" cy="8" r="7" fill="#D89B00"/>

  <!-- Inner lighter yellow area -->
  <circle cx="8" cy="8" r="6" fill="url(#coinFill)"/>

  <!-- Inner ring stroke -->
  <circle cx="8" cy="8" r="6.1"
          fill="none"
          stroke="#C28700"
          stroke-width="0.7"/>

  <!-- LingQ-style pin/heart shape -->
  <path d="M6.7,5.2c-0.8,0-1.5,0.7-1.5,1.6v0c0,0.5,0.2,0.9,0.6,1.2l2.8,3
           c0,0,0.1,0.1,0.1,0.1c0.1,0,0.2-0.1,0.2-0.2V8.3
           c0.9,0,1.5-0.8,1.5-1.6c0-0.8-0.7-1.5-1.5-1.5H6.7z"
        fill="none"
        stroke="#A66A00"
        stroke-width="0.9"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
